<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <img id="logo-img" src="./assets/weather-app-logo.svg" alt="logo">
        <div>The Weather App</div>
    </header>
    <div id="settings">
        <input type="radio" id="degC" name="setting" value="metric" checked>
        <label for="degC">&deg;C</label>
        <input type="radio" id="degF" name="setting" value="us">
        <label for="degF">F</label>
    </div>
    <form>
        <input type="text" id="search-box" name="search-box" placeholder="Search weather for a city">
        <button id="search-btn">Send</button>
    </form>
    <div id="content">
        <img id="result-img" src="#" alt="Result image">
        <div id="location">Location</div>
        <div id="result-temp">Temp result</div>
        <div id="result-summary">Summary text</div>
    </div>
    <div id="loading-screen">Loading...</div>
</body>
</html>
